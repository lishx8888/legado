name: iOS Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install dependencies
        run: |
          cd ios/Legado
          pod install || echo "No Podfile found, skipping pod install"

      - name: Build iOS app
        run: |
          cd ios/Legado
          xcodebuild -project Legado.xcodeproj -scheme Legado -configuration Release -sdk iphoneos build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -verbose

      - name: List all files after build
        run: |
          cd ios
          find . -type f -name "*.app" | head -20
          find . -type d -name "*.app" | head -20
          ls -la
          ls -la Legado
          ls -la Legado/build || echo "Build directory not found"

      - name: Package IPA
        run: |
          cd ios
          mkdir -p build/Payload
          APP_PATH=$(find . -name "Legado.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Legado.app not found"
            exit 1
          fi
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r Legado.ipa Payload

      - name: Organize the Files
        run: |
          mkdir -p ${{ github.workspace }}/ipa/
          cp -rf ${{ github.workspace }}/ios/build/*.ipa ${{ github.workspace }}/ipa/

      - name: Upload IPA To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado_ios
          path: ${{ github.workspace }}/ipa/*.ipa

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: legado_ios_${{ env.VERSION }}
          tag_name: ios_${{ env.VERSION }}
          body_path: ${{ github.workspace }}/CHANGELOG.md
          draft: false
          prerelease: false
          files: ${{ github.workspace }}/ipa/legado_*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
